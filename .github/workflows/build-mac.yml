name: build-mac

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build (tsc + copy renderer/assets)
        run: npm run build

      - name: Generate mac icon (.icns)
        run: bash scripts/gen-icon-mac.sh

      - name: Build mac artifacts (dmg + zip)
        run: npx electron-builder --mac dmg zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ApiZero-mac
          path: |
            release/*.dmg
            release/*.zip

