name: build-mac

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  mac:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [ "arm64", "x64" ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build (tsc + copy renderer/assets)
        run: npm run build

      - name: Generate mac icon (.icns)
        run: bash scripts/gen-icon-mac.sh

      - name: Verify icon exists
        run: ls -la assets/icon.icns

      - name: Build mac artifacts (dmg + zip)
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx electron-builder --mac dmg zip --arm64 --publish never
          else
            npx electron-builder --mac dmg zip --x64 --publish never
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ApiZero-mac-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip

